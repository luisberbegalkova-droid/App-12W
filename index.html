<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>KOVA - Gestor de Planes de Acción</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1" rel="stylesheet"/>
    
    <script>
        // CONFIGURACIÓN DE TU API REAL
        const API_URL = "https://script.google.com/macros/s/AKfycbwzsLD4iG_BRzSh9uWYe2bCnMTnvauTKLfEhPH4lhq1RhsjYLIoPunU72dO1ZqRgTtrlA/exec";
        let currentTab = 'OPERACIONES';

        async function cargarDatos() {
            const grid = document.getElementById('tasks-grid');
            grid.innerHTML = '<div class="col-span-full text-center py-20 text-gray-500 animate-pulse">Sincronizando con Google Sheets...</div>';
            
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                renderCards(data);
            } catch (error) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-red-600 font-bold">Error de conexión. Verifica que el Script esté publicado como "Cualquiera".</div>`;
            }
        }

        function renderCards(data) {
            const grid = document.getElementById('tasks-grid');
            grid.innerHTML = '';
            
            // Filtramos: Que tenga PLAN DE ACCIÓN y que el RESPONSABLE coincida con la pestaña
            const filtered = data.filter(item => {
                const resp = (item['RESPONSABLE'] || '').toUpperCase();
                const tienePlan = (item['PLAN DE ACCIÓN'] || '').toString().trim() !== '';
                return tienePlan && resp.includes(currentTab);
            });

            if (filtered.length === 0) {
                grid.innerHTML = `<div class="col-span-full text-center py-20 text-gray-400 italic text-lg">No hay tareas pendientes en la sección de ${currentTab.toLowerCase()}.</div>`;
                return;
            }

            filtered.forEach(item => {
                const totalValue = parseFloat(item['Total']) || 0;
                const esNegativo = totalValue < 0;
                const idItem = item['ID'] || 'N/A';
                const planAccion = item['PLAN DE ACCIÓN'];
                const avisoIcono = item['Aviso'] || '📋';
                
                const card = `
                    <article class="bg-white border border-gray-200 rounded-xl overflow-hidden flex flex-col h-full hover:shadow-lg transition-all duration-300">
                        <div class="px-4 py-3 border-b border-gray-100 flex justify-between items-center bg-gray-50/50">
                            <span class="font-mono text-xs text-gray-500 px-2 py-1 bg-white border border-gray-200 rounded">${idItem}</span>
                            <span class="font-mono text-xs ${esNegativo ? 'text-red-600 bg-red-50' : 'text-green-600 bg-green-50'} font-bold px-2 py-1 rounded">
                                Stock Total: ${totalValue}
                            </span>
                        </div>
                        <div class="p-6 flex-1">
                            <div class="flex items-start gap-3">
                                <span class="text-xl">${avisoIcono}</span>
                                <h3 class="font-semibold text-gray-900 leading-snug text-lg">
                                    ${planAccion}
                                </h3>
                            </div>
                        </div>
                        <div class="px-4 py-4 bg-gray-50 border-t border-gray-100 flex justify-between items-center">
                            <div class="flex items-center gap-2">
                                <span class="material-symbols-outlined text-sm text-gray-400">person</span>
                                <span class="text-xs font-medium text-gray-600">${currentTab}</span>
                            </div>
                            <button class="text-sm font-bold text-blue-600 hover:text-blue-800 transition-colors">
                                Ver detalle
                            </button>
                        </div>
                    </article>
                `;
                grid.innerHTML += card;
            });
        }

        function switchTab(tabName, element) {
            currentTab = tabName.toUpperCase();
            document.getElementById('section-title').innerText = `Planes de ${tabName}`;
            
            // Estética de las pestañas
            document.querySelectorAll('nav a').forEach(el => {
                el.className = "text-gray-500 pb-1 hover:text-black transition-colors cursor-pointer text-lg";
            });
            element.className = "text-black border-b-2 border-black pb-1 font-bold cursor-pointer text-lg";
            
            cargarDatos();
        }

        window.onload = cargarDatos;
    </script>

    <style>
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        body { font-family: 'Inter', sans-serif; background-color: #fcfcfd; }
    </style>
</head>

<body class="h-screen flex flex-col">
    <header class="bg-white border-b border-gray-200 shrink-0 sticky top-0 z-50">
        <div class="flex justify-between items-center w-full px-8 py-5 max-w-[1400px] mx-auto">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-black rounded flex items-center justify-center text-white font-bold text-xs italic">KOVA</div>
                <span class="text-lg font-bold tracking-tight">Gestor Industrial</span>
            </div>
            
            <nav class="hidden md:flex gap-10">
                <a onclick="switchTab('Operaciones', this)" class="text-black border-b-2 border-black pb-1 font-bold cursor-pointer text-lg">Operaciones</a>
                <a onclick="switchTab('Comercial', this)" class="text-gray-500 pb-1 hover:text-black transition-colors cursor-pointer text-lg">Comercial</a>
                <a onclick="switchTab('Administración', this)" class="text-gray-500 pb-1 hover:text-black transition-colors cursor-pointer text-lg">Administración</a>
            </nav>

            <div class="flex items-center gap-5">
                <span class="material-symbols-outlined text-gray-400 cursor-pointer hover:text-black">search</span>
                <span class="material-symbols-outlined text-gray-400 cursor-pointer hover:text-black">notifications</span>
                <div class="w-8 h-8 rounded-full bg-gray-200 border border-gray-300"></div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-y-auto p-8 md:p-12">
        <div class="max-w-[1400px] mx-auto">
            <div class="flex justify-between items-end mb-10">
                <div>
                    <h1 id="section-title" class="text-4xl font-bold text-gray-900 tracking-tight">Planes de Operaciones</h1>
                    <p class="text-gray-500 mt-2 text-lg">Tareas activas extraídas del listado de necesidades 12W.</p>
                </div>
                <button onclick="cargarDatos()" class="flex items-center gap-2 px-4 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-semibold transition-all">
                    <span class="material-symbols-outlined text-sm">refresh</span>
                    Actualizar
                </button>
            </div>

            <div id="tasks-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                </div>
        </div>
    </main>
</body>
</html>
